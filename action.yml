name: "GPT Localize Action"
description: "Easily keep your translation files up-to-date and in sync with the latest English source strings using GPT-4."
author: "Vivek Maskara"
branding:
  color: "blue"
  icon: "globe"

inputs:
  token:
    description: "GitHub token used for git operations (recommended). Defaults to the workflow's GITHUB_TOKEN."
    required: false
  openai_api_key:
    description: "OpenAI API key for fetching translations (deprecated, use ai_api_key)"
    required: false
  ai_api_key:
    description: "API key for the AI provider (supports OpenAI, Anthropic, etc.)"
    required: false
  ai_provider:
    description: "AI provider to use (openai, anthropic). Default: openai"
    required: false
    default: "openai"
  ai_model:
    description: "AI model to use. Default depends on provider (gpt-4 for openai, claude-3-haiku-20240307 for anthropic)"
    required: false
  personal_access_token:
    description: "Personal Access Token to create branches and PRs (deprecated, use token)"
    required: false
  locales_path:
    description: "The path to the locales directory relative to the repository root"
    required: true
    default: ""
  base_language:
    description: "The base language for translations (default: en)"
    required: false
    default: "en"
  base_file:
    description: "The base translation file (default: en.json)"
    required: false
    default: "en.json"
  create_pull_request:
    description: "Whether to create a pull request (true) or commit directly to branch (false). Default: true"
    required: false
    default: "true"
  rate_limit_max_retries:
    description: "Max retries per request on 429 rate limits (default: 6)"
    required: false
    default: "6"
  rate_limit_error_threshold:
    description: "Fail the run after this many total 429s (default: 25)"
    required: false
    default: "25"
  rate_limit_base_delay_ms:
    description: "Initial backoff delay in ms for 429 retries (default: 1000)"
    required: false
    default: "1000"
  rate_limit_max_delay_ms:
    description: "Max backoff delay in ms for 429 retries (default: 30000)"
    required: false
    default: "30000"
  rate_limit_jitter_ms:
    description: "Max jitter in ms added to 429 backoff (default: 250)"
    required: false
    default: "250"

outputs:
  has_changes:
    description: "Indicates if any translation changes were made"
    value: ${{ steps.check_changes.outputs.has_changes }}

runs:
  using: "composite"
  steps:
    - name: Resolve GitHub token
      id: resolve_github_token
      shell: bash
      run: |
        echo "token=${{ inputs.token || inputs.personal_access_token || github.token }}" >> "$GITHUB_OUTPUT"

    - name: Validate inputs
      shell: bash
      env:
        RESOLVED_TOKEN: ${{ steps.resolve_github_token.outputs.token }}
      run: |
        if [[ -z "${RESOLVED_TOKEN}" ]]; then
          echo "::error title=Missing input::No GitHub token provided (set 'token' or 'personal_access_token')."
          exit 1
        fi

    - name: Checkout repository
      uses: actions/checkout@v3
      with:
        fetch-depth: 0
        persist-credentials: true
        token: ${{ steps.resolve_github_token.outputs.token }}

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '22'
    
    - name: Install dependencies
      shell: bash
      working-directory: ${{ github.action_path }}/scripts/translate
      run: yarn install

    - name: Run translation update script
      shell: bash
      env:
        AI_API_KEY: ${{ inputs.ai_api_key || inputs.openai_api_key }}
        AI_PROVIDER: ${{ inputs.ai_provider }}
        AI_MODEL: ${{ inputs.ai_model }}
        AI_RATE_LIMIT_MAX_RETRIES: ${{ inputs.rate_limit_max_retries }}
        AI_RATE_LIMIT_ERROR_THRESHOLD: ${{ inputs.rate_limit_error_threshold }}
        AI_RATE_LIMIT_BASE_DELAY_MS: ${{ inputs.rate_limit_base_delay_ms }}
        AI_RATE_LIMIT_MAX_DELAY_MS: ${{ inputs.rate_limit_max_delay_ms }}
        AI_RATE_LIMIT_JITTER_MS: ${{ inputs.rate_limit_jitter_ms }}
      run: |
        node ${{ github.action_path }}/scripts/translate/index.js -d ${{ inputs.locales_path }} -s ${{ inputs.base_language }} -f ${{ inputs.base_file }}

    - name: Check for changes
      id: check_changes
      shell: bash
      run: |
        if git status --porcelain "${{ inputs.locales_path }}" | grep .; then
          echo "Changes detected"
          echo "has_changes=true" >> $GITHUB_OUTPUT
        else
          echo "No changes detected"
          echo "has_changes=false" >> $GITHUB_OUTPUT
        fi

    - name: Commit changes directly
      if: steps.check_changes.outputs.has_changes == 'true' && inputs.create_pull_request == 'false'
      shell: bash
      run: |
        git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add "${{ inputs.locales_path }}"
        git commit -m "Update translations [ci skip]"
        git push

    - name: Create pull request
      if: steps.check_changes.outputs.has_changes == 'true' && inputs.create_pull_request == 'true'
      uses: peter-evans/create-pull-request@v7
      env:
        GITHUB_TOKEN: ${{ steps.resolve_github_token.outputs.token }}
      with:
        token: ${{ steps.resolve_github_token.outputs.token }}
        commit-message: "Update translations [ci skip]"
        committer: github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>
        author: github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>
        branch: update-translations
        branch-suffix: timestamp
        delete-branch: true
        base: ${{ github.ref_name }}
        title: "Update Translations"
        body: |
          This PR includes updated translations based on the latest changes to '${{ inputs.base_file }}'.
          
          - Auto-generated by [GPT Localize Action](https://github.com/mangoappstudio/gpt-localize-action)
        labels: |
          translations
          automated pr
        draft: false
